<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskShift | Control Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #1a237e !important; }
        .card { border: none; border-radius: 10px; }
        .nav-tabs .nav-link { color: #555; border: none; padding: 12px 20px; }
        .nav-tabs .nav-link.active { color: #1a237e; font-weight: bold; border-bottom: 3px solid #1a237e; background: none; }
        .status-badge { font-size: 0.85rem; padding: 6px 12px; border-radius: 20px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark mb-4 shadow">
        <div class="container">
            <span class="navbar-brand mb-0 h1">⚙️ TaskShift Control Room</span>
        </div>
    </nav>

    <div class="container">
        <ul class="nav nav-tabs mb-4" id="mainTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-operar">🚀 Operar</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-gestao">🛠️ Gestão</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-agenda">📅 Agendamentos</button>
            </li>
        </ul>

        <div class="tab-content">
            
            <div class="tab-pane fade show active" id="tab-operar">
                <div class="row">
                    <div class="col-md-3">
                        <div class="card shadow-sm mb-4">
                            <div class="card-header">Disparo Manual</div>
                            <div class="card-body">
                                <form id="playForm">
                                    <div class="mb-3">
                                        <label class="form-label">Robô</label>
                                        <select class="form-select" id="robotSelect" required></select>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Máquina</label>
                                        <select class="form-select" id="machineSelect" required></select>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100">Iniciar Execução</button>
                                </form>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-9">
                        <div class="card shadow-sm">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <span>Fila de Execução</span>
                                <span class="badge bg-light text-dark" id="lastUpdate"></span>
                            </div>
                            <div class="card-body p-0">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th class="ps-3">Status</th>
                                            <th>Nome do Robô</th>
                                            <th>Máquina</th>
                                            <th>Início</th>
                                            <th>Progresso</th>
                                            <th class="text-end pe-3">Ação</th>
                                        </tr>
                                    </thead>
                                    <tbody id="queueTableBody">
                                        <tr><td colspan="6" class="text-center py-4">Carregando fila...</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="tab-gestao">
                <div class="row">
                    <div class="col-md-4">
                        <div class="card shadow-sm mb-4">
                            <div class="card-header">Cadastrar Novo Robô</div>
                            <div class="card-body">
                                <form id="createRobotForm">
                                    <div class="mb-3"><label class="form-label">Nome</label><input type="text" class="form-control" id="newRobotName" required></div>
                                    <div class="mb-3"><label class="form-label">Caminho Script</label><input type="text" class="form-control" id="newRobotPath" required></div>
                                    <button type="submit" class="btn btn-success w-100">Salvar Robô</button>
                                </form>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="card shadow-sm">
                            <div class="card-header">Robôs Cadastrados</div>
                            <div class="card-body p-0">
                                <table class="table mb-0">
                                    <thead><tr><th class="ps-3">Robô</th><th>Script</th><th class="text-end pe-3">Config</th></tr></thead>
                                    <tbody id="robotsTableBody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="tab-agenda">
                <div class="row">
                    <div class="col-md-4">
                        <div class="card shadow-sm">
                            <div class="card-header text-dark">Novo Agendamento</div>
                            <div class="card-body">
                                <form id="scheduleForm">
                                    <div class="mb-3"><label class="form-label">Robô</label><select class="form-select" id="schRobotSelect" required></select></div>
                                    <div class="mb-3"><label class="form-label">Máquina</label><select class="form-select" id="schMachineSelect" required></select></div>
                                    <div class="mb-3"><label class="form-label">Horário</label><input type="time" class="form-control" id="schTime" required></div>
                                    <button type="submit" class="btn btn-warning w-100 fw-bold">📅 Agendar</button>
                                </form>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="card shadow-sm">
                            <div class="card-header">Cronograma Ativo</div>
                            <div class="card-body p-0">
                                <table class="table mb-0">
                                    <thead><tr><th class="ps-3">Robô</th><th>Máquina</th><th>Hora</th><th class="text-end pe-3">Status</th></tr></thead>
                                    <tbody id="schedulesTableBody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const API_BASE_URL = "http://127.0.0.1:8000/api/v1";
        let mapaMaquinas = {};
        let mapaRobos = {};

        // Tradução de Status
        const traduzirStatus = (status) => {
            if (status === 'RUNNING') return { texto: 'Rodando', classe: 'bg-primary' };
            if (status === 'PENDING') return { texto: 'Aguardando', classe: 'bg-warning text-dark' };
            return { texto: status, classe: 'bg-secondary' };
        };

        // CARREGAR DADOS INICIAIS
        async function carregarDadosIniciais() {
            try {
                const [respMach, respRobo] = await Promise.all([
                    fetch(`${API_BASE_URL}/machines`),
                    fetch(`${API_BASE_URL}/robots`)
                ]);
                
                const maquinas = await respMach.json();
                const robos = await respRobo.json();

                const machSelects = [document.getElementById('machineSelect'), document.getElementById('schMachineSelect')];
                const roboSelects = [document.getElementById('robotSelect'), document.getElementById('schRobotSelect')];

                maquinas.forEach(m => {
                    mapaMaquinas[m.machine_id] = m.hostname;
                    machSelects.forEach(s => s.innerHTML += `<option value="${m.machine_id}">${m.hostname}</option>`);
                });

                const robotTable = document.getElementById('robotsTableBody');
                robotTable.innerHTML = '';
                robos.forEach(r => {
                    mapaRobos[r.robot_id] = r.robot_name;
                    roboSelects.forEach(s => s.innerHTML += `<option value="${r.robot_id}">${r.robot_name}</option>`);
                    robotTable.innerHTML += `<tr><td class="ps-3 fw-bold">${r.robot_name}</td><td>${r.script_path}</td><td class="text-end pe-3"><button class="btn btn-sm btn-light">⚙️</button></td></tr>`;
                });
            } catch (e) { console.error("Erro ao carregar bases:", e); }
        }

        // CARREGAR FILA (FRAMEWORK STYLE)
        async function carregarFila() {
            try {
                const response = await fetch(`${API_BASE_URL}/executions/queue`);
                const fila = await response.json();
                const tbody = document.getElementById('queueTableBody');
                tbody.innerHTML = '';

                if (fila.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">Nenhum robô em execução ou na fila.</td></tr>';
                    return;
                }

                fila.forEach(exec => {
                    const statusInfo = traduzirStatus(exec.status);
                    const nomeRobo = mapaRobos[exec.robot_id] || "Desconhecido";
                    const nomeMaquina = mapaMaquinas[exec.machine_id] || "Desconhecido";
                    const progresso = exec.expected_items > 0 ? `${exec.processed_success} / ${exec.expected_items}` : '0 / 0';
                    const inicio = exec.start_time ? new Date(exec.start_time).toLocaleTimeString() : '--:--';

                    tbody.innerHTML += `
                        <tr>
                            <td class="ps-3"><span class="badge status-badge ${statusInfo.classe}">${statusInfo.texto}</span></td>
                            <td class="fw-bold text-secondary">${nomeRobo}</td>
                            <td><span class="text-muted small">💻</span> ${nomeMaquina}</td>
                            <td>${inicio}</td>
                            <td><small>${progresso}</small></td>
                            <td class="text-end pe-3">
                                <button class="btn btn-sm btn-outline-danger" onclick="pararRobo('${exec.execution_id}')">Stop</button>
                            </td>
                        </tr>
                    `;
                });
                document.getElementById('lastUpdate').innerText = `Atualizado às: ${new Date().toLocaleTimeString()}`;
            } catch (e) { console.error("Erro na fila:", e); }
        }

        async function pararRobo(id) {
            if(confirm("Deseja interromper este robô?")) {
                await fetch(`${API_BASE_URL}/executions/${id}/stop`, { method: 'POST' });
                carregarFila();
            }
        }

        // DISPARO MANUAL
        document.getElementById('playForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = { 
                robot_id: document.getElementById('robotSelect').value, 
                machine_id: document.getElementById('machineSelect').value 
            };
            await fetch(`${API_BASE_URL}/executions/play`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            carregarFila();
        });

        window.onload = async () => {
            await carregarDadosIniciais();
            carregarFila();
            setInterval(carregarFila, 3000);
        };
    </script>
</body>
</html>
